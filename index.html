<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семинар</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cormorant Garamond', serif, Georgia, serif;
            background: linear-gradient(135deg, #fff9f5 0%, #f8f4f0 100%);
            color: #5a4a42;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
        }
        .header::before {
            content: "❀";
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 32px;
            color: #d4bda0;
            transform: rotate(-15deg);
        }
        .header::after {
            content: "❀";
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 32px;
            color: #d4bda0;
            transform: rotate(15deg);
        }
        h1 {
            font-size: 42px;
            color: #8b6b5b;
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .greeting {
            font-size: 32px;
            font-weight: bold;
            color: #7a5a48;
            text-align: center;
            margin: 80px 0 40px;
            position: relative;
            line-height: 1.3;
        }
        .greeting::before,
        .greeting::after {
            content: "✿";
            display: inline-block;
            margin: 0 20px;
            color: #c9b4a1;
            font-size: 24px;
        }
        .instruction {
            font-size: 22px;
            text-align: center;
            margin-bottom: 50px;
            color: #6a554a;
            line-height: 1.5;
        }
        .btn {
            display: block;
            width: 280px;
            margin: 0 auto;
            padding: 20px 40px;
            background: linear-gradient(to bottom, #b89e87, #a68a77);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 6px 25px rgba(184, 158, 135, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }
        .btn::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            transition: all 0.6s;
        }
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(184, 158, 135, 0.5);
        }
        .btn:hover::before {
            left: 150%;
        }
        footer {
            text-align: center;
            padding: 30px 20px;
            color: #8b6b5b;
            font-size: 14px;
            border-top: 1px solid #e8d9c7;
            margin-top: 80px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>добро пожаловать</h1>
        </header>
        <main>
            <p class="greeting">рады видеть на семинаре :)</p>
            <p class="instruction">Чтобы продолжить, нажми кнопку</p>
            <a href="task.html" class="btn">Перейти к заданию</a>
        </main>
        <footer>
            © 2026 
        </footer>
    </div>
</body>
</html>
